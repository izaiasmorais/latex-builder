StylesPath = styles

MinAlertLevel = suggestion

Vocab = Tech

Packages = Vale

[*.tex]
BasedOnStyles = Vale, PT
TokenIgnores = (\\\w+\{[^}]*\}), (\$[^$]+\$), (\\cite\{[^}]*\}), (\\ref\{[^}]*\}), (\\label\{[^}]*\})
BlockIgnores = (?s)(\\begin\{(figure|table|lstlisting|verbatim|equation|tabular)\}.*?\\end\{(figure|table|lstlisting|verbatim|equation|tabular)\})
CommentDelimiters = %, %
